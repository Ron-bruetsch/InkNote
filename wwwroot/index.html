<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>InkNote</title>
  <link rel="stylesheet" href="/css/app.css">
  <link rel="stylesheet" href="/css/hljs-dark.min.css">
</head>
<body>
<div id="app">

  <!-- ── Toolbar ────────────────────────────────────────────────────────── -->
  <div id="toolbar">

    <button class="tb-btn icon-only" id="btn-sidebar" title="Toggle sidebar">
      <span class="tool-icon">
        <svg viewBox="0 0 16 16"><line x1="2" y1="4.5" x2="14" y2="4.5"/><line x1="2" y1="8" x2="14" y2="8"/><line x1="2" y1="11.5" x2="14" y2="11.5"/></svg>
      </span>
    </button>

    <div class="tb-sep"></div>

    <div class="tb-group">
      <button class="tb-btn icon-only" id="btn-undo" title="Undo (Ctrl+Z)">
        <span class="tool-icon">
          <svg viewBox="0 0 16 16"><path d="M4 7.5A5 5 0 1 1 6 12"/><polyline points="1.5 5 4 7.5 6.5 5"/></svg>
        </span>
      </button>
      <button class="tb-btn icon-only" id="btn-redo" title="Redo (Ctrl+Shift+Z)">
        <span class="tool-icon">
          <svg viewBox="0 0 16 16"><path d="M12 7.5A5 5 0 1 0 10 12"/><polyline points="14.5 5 12 7.5 9.5 5"/></svg>
        </span>
      </button>
    </div>

    <div class="tb-sep"></div>

    <!-- Drawing tools -->
    <div class="tb-group">
      <button class="tb-btn icon-only active" id="btn-pen" title="Pen (B)">
        <span class="tool-icon">
          <svg viewBox="0 0 16 16"><path d="M10.5 2L14 5.5 5.5 14H2v-3.5Z"/><line x1="8" y1="4" x2="12" y2="8"/></svg>
        </span>
      </button>
      <button class="tb-btn icon-only" id="btn-pencil" title="Pencil">
        <span class="tool-icon">
          <svg viewBox="0 0 16 16"><path d="M3 13l8-8 2 2-8 8H3v-2z"/><path d="M11 5l1.5-1.5 1 1L12 6"/></svg>
        </span>
      </button>
      <button class="tb-btn icon-only" id="btn-brush" title="Brush">
        <span class="tool-icon">
          <svg viewBox="0 0 16 16"><path d="M10 2l4 4-6 6-1-1-1 3c-.5 1.5-2 1-2 1s-.5-1.5 1-2l3-1-1-1 3-9z"/></svg>
        </span>
      </button>
      <button class="tb-btn icon-only" id="btn-marker" title="Marker">
        <span class="tool-icon">
          <svg viewBox="0 0 16 16"><path d="M4 12L11 5l2 2-7 7H4v-2z" stroke-width="2"/><line x1="3" y1="14" x2="13" y2="14"/></svg>
        </span>
      </button>
    </div>

    <div class="tb-sep"></div>

    <div class="tb-group">
      <button class="tb-btn icon-only" id="btn-eraser" title="Eraser (E) — hold Alt">
        <span class="tool-icon">
          <svg viewBox="0 0 16 16"><path d="M9 3l4 4-5 6H4L2 11l5-8z"/><line x1="1" y1="14" x2="15" y2="14"/></svg>
        </span>
      </button>
      <button class="tb-btn icon-only" id="btn-pan" title="Pan (Space)">
        <span class="tool-icon">
          <svg viewBox="0 0 16 16"><path d="M6 7V3a1 1 0 0 1 2 0v4m0 0V2.5a1 1 0 0 1 2 0V7m0 0V4a1 1 0 0 1 2 0v3c0 4-1.5 6.5-4 7.5C5.5 13.5 4 11 4 7V5.5a1 1 0 0 1 2 0V7"/></svg>
        </span>
      </button>
    </div>

    <div class="tb-sep"></div>

    <div class="tb-group">
      <button class="tb-btn icon-only" id="btn-text" title="Insert text block">
        <span class="tool-icon">
          <svg viewBox="0 0 16 16"><rect x="2" y="2" width="12" height="12" rx="1.5"/><line x1="5" y1="5.5" x2="11" y2="5.5"/><line x1="5" y1="8" x2="11" y2="8"/><line x1="5" y1="10.5" x2="8.5" y2="10.5"/></svg>
        </span>
      </button>
      <button class="tb-btn icon-only" id="btn-sticky" title="Insert sticky note">
        <span class="tool-icon">
          <svg viewBox="0 0 16 16"><path d="M3 2h8l3 3v9H3z"/><path d="M11 2v3h3"/></svg>
        </span>
      </button>
      <button class="tb-btn icon-only" id="btn-code" title="Insert code block">
        <span class="tool-icon">
          <svg viewBox="0 0 16 16"><polyline points="5 4 1 8 5 12"/><polyline points="11 4 15 8 11 12"/><line x1="9" y1="3" x2="7" y2="13"/></svg>
        </span>
      </button>
    </div>

    <div class="tb-sep"></div>

    <div class="tb-group">
      <button class="tb-btn" id="color-swatch-btn" title="Color picker">
        <div id="color-swatch"></div>
        <span class="swatch-label">Color</span>
      </button>
      <button class="tb-btn" id="brush-btn" title="Brush & eraser size">
        <span class="tool-icon">
          <svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="5.5"/><circle cx="8" cy="8" r="2" fill="currentColor" stroke="none"/></svg>
        </span>
        <span class="swatch-label">Size</span>
      </button>
    </div>

    <div class="tb-sep"></div>

    <div class="tb-group">
      <button class="tb-btn icon-only" id="btn-zoom-out" title="Zoom out (Ctrl+-)">
        <span class="tool-icon">
          <svg viewBox="0 0 16 16"><circle cx="6.5" cy="6.5" r="4"/><line x1="9.3" y1="9.3" x2="14" y2="14"/><line x1="4.5" y1="6.5" x2="8.5" y2="6.5"/></svg>
        </span>
      </button>
      <button class="tb-btn" id="btn-zoom-reset" title="Reset zoom (Ctrl+0)">100%</button>
      <button class="tb-btn icon-only" id="btn-zoom-in" title="Zoom in (Ctrl+=)">
        <span class="tool-icon">
          <svg viewBox="0 0 16 16"><circle cx="6.5" cy="6.5" r="4"/><line x1="9.3" y1="9.3" x2="14" y2="14"/><line x1="4.5" y1="6.5" x2="8.5" y2="6.5"/><line x1="6.5" y1="4.5" x2="6.5" y2="8.5"/></svg>
        </span>
      </button>
    </div>

    <div class="tb-spacer"></div>

    <span class="save-status saved" id="save-status">Saved</span>

  </div>

  <!-- ── Main area ──────────────────────────────────────────────────────── -->
  <div id="main">

    <div id="sidebar">
      <div id="sidebar-header">
        Notebooks
        <button id="add-notebook-btn" title="New notebook">+</button>
      </div>
      <div id="notebook-list"></div>
    </div>

    <div id="canvas-container">
      <canvas id="canvas-committed"></canvas>
      <canvas id="canvas-active"></canvas>
      <div id="embeds-layer"></div>
    </div>

  </div>
</div>

<!-- ── Color Picker Popup ──────────────────────────────────────────────── -->
<div id="color-picker-popup">
  <div id="color-picker-panel"></div>
  <div id="color-presets"></div>
</div>

<!-- ── Brush Popup ─────────────────────────────────────────────────────── -->
<div id="brush-popup">
  <div class="popup-row">
    <span class="popup-label">Pen size</span>
    <input type="range" id="size-slider" min="1" max="80" value="4">
    <span class="popup-val" id="size-val">4</span>
  </div>
  <div class="popup-row">
    <span class="popup-label">Eraser</span>
    <input type="range" id="eraser-slider" min="4" max="120" value="24">
    <span class="popup-val" id="eraser-val">24</span>
  </div>
</div>

<script src="/lib/highlight.min.js"></script>
<script type="module" src="/js/app.js"></script>
</body>
</html>
